name: Build Templates

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-templates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get template list
        id: templates
        run: |
          templates=$(ls -d templates/*/ | sed 's|templates/||' | sed 's|/$||')
          echo "list=$templates" >> $GITHUB_OUTPUT
          echo "count=$(echo $templates | wc -w)" >> $GITHUB_OUTPUT
          echo "$templates" > template_list.txt

      - name: Upload template list
        uses: actions/upload-artifact@v4
        with:
          name: template-list
          path: template_list.txt
          retention-days: 1

  collect-artifact-info:
    needs: [build-templates, build-matrix]
    runs-on: ubuntu-latest
    outputs:
      mapping: ${{ steps.collect.outputs.mapping }}
    steps:
      - uses: actions/checkout@v4

      - name: Download template list
        uses: actions/download-artifact@v4
        with:
          name: template-list
          path: .

      - name: Collect artifact IDs
        id: collect
        run: |
          python3 <<EOF
          import json

          owner = "${{ github.repository }}".split("/")[0]
          repo = "${{ github.repository }}".split("/")[1]
          run_id = "${{ github.run_id }}"

          with open('template_list.txt', 'r') as f:
              templates = f.read().strip().split()

          mapping = {}
          for t in templates:
              mapping[t] = f"https://github.com/{owner}/{repo}/actions/runs/{run_id}/artifacts/{t}-artifact"

          print(f"::set-output name=mapping::{json.dumps(mapping)}")
          EOF

  update-config:
    needs: [build-templates, collect-artifact-info]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update all-lutin-configs.json
        run: |
          python3 <<EOF
          import json

          with open('all-lutin-configs.json', 'r') as f:
              config = json.load(f)

          mapping = json.loads('${{ needs.collect-artifact-info.outputs.mapping }}')

          for key in config:
              if key in mapping:
                  config[key]['download_url'] = mapping[key]

          with open('all-lutin-configs.json', 'w') as f:
              json.dump(config, f, indent=2)
          EOF

      - name: Commit and push updated config
        if: github.event_name == 'push'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add all-lutin-configs.json
          git diff --cached --quiet || git commit -m "Update download URLs in all-lutin-configs.json"
          git push